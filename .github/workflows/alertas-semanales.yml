name: Alerta semanal de ventas

on:
  # Se dispara DESPUÉS de que el workflow de datos actualiza ventas-2026.json.
  # workflow_run solo se activa en la rama por defecto (main).
  workflow_run:
    workflows: ["Actualizar datos de ventas"]
    types: [completed]
    branches: [main]

  # Cron de respaldo: lunes 21:00 UTC = lunes 16:00 Lima (UCT-5).
  # Cubre el caso en que update-data falló o no se ejecutó.
  schedule:
    - cron: '0 21 * * 1'

  # Ejecución manual desde la UI de GitHub Actions.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulación (no envía email real)'
        type: boolean
        default: true

permissions:
  contents: write   # necesario para commitear alertas-envios.json

jobs:
  alerta:
    # Si viene por workflow_run, solo correr si el upstream fue exitoso.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # token con permisos de push para el commit de envios
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ejecutar alerta semanal
        id: alerta
        run: node scripts/alertas.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # En dispatch manual, respeta el input dry_run. En schedule/workflow_run, envía real.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && 'true' || 'false' }}

      - name: Registrar envío en el repo
        # Solo si el paso anterior tuvo éxito Y no fue dry-run
        if: >-
          success() &&
          !(github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/alertas-envios.json
          if git diff --cached --quiet; then
            echo "Sin cambios en alertas-envios.json (semana ya registrada)"
          else
            WEEK=$(TZ='America/Lima' date +'%Y-W%V')
            git commit -m "chore: alerta semanal ${WEEK} enviada"
            git push
          fi
